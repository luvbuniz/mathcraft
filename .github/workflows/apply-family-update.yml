name: Apply MathCraft family update
on:
  push:
    paths:
      - .github/workflows/apply-family-update.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply update
        shell: python
        run: |
          import base64, gzip, subprocess
          data = ""
          open('/tmp/mathcraft.patch', 'wb').write(gzip.decompress(base64.b64decode(data)))
          subprocess.check_call(['git', 'apply', '--check', '/tmp/mathcraft.patch'])
          subprocess.check_call(['git', 'apply', '/tmp/mathcraft.patch'])
      - name: Validate and publish
        run: |
          node -e "const fs=require('fs'),vm=require('vm');const h=fs.readFileSync('index.html','utf8');const s=[...h.matchAll(/<script(?:\\s[^>]*)?>([\\s\\S]*?)<\\/script>/gi)].map(m=>m[1]).filter(Boolean);s.forEach((x,i)=>new vm.Script(x,{filename:'inline-'+i}));for(const x of ['cursorBtn','mathPopup','startMenuGrid'])if(!h.includes('id=\"'+x+'\"'))throw Error('missing '+x);"
          rm .github/workflows/apply-family-update.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/apply-family-update.yml
          git commit -m "Improve MathCraft building, saves, and adaptive math"
          git push
