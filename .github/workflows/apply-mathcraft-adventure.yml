name: Apply MathCraft adventure update

on:
  push:
    branches:
      - claude/serene-maxwell-pvjoce
    paths:
      - .github/workflows/apply-mathcraft-adventure.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply and validate update
        shell: bash
        run: |
          git apply --check .github/mathcraft-adventure.patch
          git apply .github/mathcraft-adventure.patch
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/g)].map(m => m[1]).filter(Boolean);
          for (const code of scripts) new vm.Script(code);
          const ids = [...html.matchAll(/\sid="([^"]+)"/g)].map(m => m[1]);
          const refs = [...scripts.join('\n').matchAll(/\$\('([^']+)'\)/g)].map(m => m[1]);
          const missing = [...new Set(refs.filter(id => !ids.includes(id)))];
          if (missing.length) throw new Error('Missing element IDs: ' + missing.join(', '));
          NODE
          rm .github/mathcraft-adventure.patch
          rm .github/workflows/apply-mathcraft-adventure.yml
      - name: Commit game update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Merge building and Gloomy adventure modes"
          git push
