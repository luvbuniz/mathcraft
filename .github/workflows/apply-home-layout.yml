name: Apply MathCraft homepage layout
on:
  push:
    paths:
      - .github/workflows/apply-home-layout.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply layout
        shell: python
        run: |
          import base64, gzip, subprocess
          data = ""
          open('/tmp/layout.patch','wb').write(gzip.decompress(base64.b64decode(data)))
          subprocess.check_call(['git','apply','--check','/tmp/layout.patch'])
          subprocess.check_call(['git','apply','/tmp/layout.patch'])
      - name: Validate and publish
        run: |
          node -e "const fs=require('fs'),vm=require('vm');const h=fs.readFileSync('index.html','utf8');[...h.matchAll(/<script(?:\\s[^>]*)?>([\\s\\S]*?)<\\/script>/gi)].map(m=>m[1]).filter(Boolean).forEach((s,i)=>new vm.Script(s,{filename:'inline-'+i}));for(const id of ['startShell','startMenuGrid','startFooter'])if(!h.includes('id=\"'+id+'\"'))throw Error('missing '+id);"
          rm .github/workflows/apply-home-layout.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/apply-home-layout.yml
          git commit -m "Redesign the MathCraft start screen layout"
          git push
